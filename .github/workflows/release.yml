name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          version="$(sed -n 's:.*<Version>\([^<]*\)</Version>.*:\1:p' HighPop/HighPop.csproj | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Could not read the HighPop project version" >&2
            exit 1
          fi

          tag="v$version"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            tag="${{ github.ref_name }}"
            if [[ "$tag" != "v$version" ]]; then
              echo "Tag $tag does not match project version $version" >&2
              exit 1
            fi
            publish=true
          elif git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "$tag already exists; this main-branch push does not need another release."
            publish=false
          else
            publish=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  windows-x64:
    needs: prepare
    if: needs.prepare.outputs.publish == 'true'
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore HighPop.sln

      - name: Build
        run: dotnet build HighPop.sln -c Release --no-restore

      - name: Smoke tests
        run: dotnet run --project HighPop.SmokeTests/HighPop.SmokeTests.csproj -c Release --no-build

      - name: Publish self-contained single file
        run: dotnet publish HighPop/HighPop.csproj -c Release -r win-x64 --self-contained true -o publish_out

      - name: Verify release version and executable
        shell: pwsh
        run: |
          $exe = Get-Item publish_out/HighPop.exe
          if ($exe.Length -lt 1MB) { throw "HighPop.exe is unexpectedly small" }
          $expected = "${{ needs.prepare.outputs.version }}"
          $actual = $exe.VersionInfo.FileVersion
          if ($actual -ne "$expected.0") {
            throw "Release ${{ needs.prepare.outputs.tag }} does not match executable version $actual"
          }

      - name: Sign executable when a certificate is configured
        shell: pwsh
        env:
          HIGHPOP_SIGNING_CERT_BASE64: ${{ secrets.HIGHPOP_SIGNING_CERT_BASE64 }}
          HIGHPOP_SIGNING_CERT_PASSWORD: ${{ secrets.HIGHPOP_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:HIGHPOP_SIGNING_CERT_BASE64)) {
            Write-Host "No signing certificate configured; publishing an unsigned community build."
            exit 0
          }

          $pfx = Join-Path $env:RUNNER_TEMP "highpop-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:HIGHPOP_SIGNING_CERT_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $signtool) { throw "signtool.exe was not found" }

          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr https://timestamp.digicert.com `
            /f $pfx /p $env:HIGHPOP_SIGNING_CERT_PASSWORD publish_out/HighPop.exe
          if ($LASTEXITCODE -ne 0) { throw "Authenticode signing failed" }
          if ((Get-AuthenticodeSignature publish_out/HighPop.exe).Status -ne "Valid") {
            throw "The signed HighPop.exe failed Authenticode verification"
          }
          Remove-Item $pfx -Force

      - name: Assemble portable package
        shell: pwsh
        run: |
          $baseName = "HighPop-${{ needs.prepare.outputs.tag }}-win-x64"
          New-Item package/HighPop/assets/presets -ItemType Directory -Force | Out-Null
          Copy-Item publish_out/HighPop.exe package/HighPop/
          Copy-Item HighPop/assets/README.txt package/HighPop/assets/
          Copy-Item HighPop/assets/presets/*.json package/HighPop/assets/presets/
          Copy-Item -Path LICENSE,NOTICE.md,README.md,CHANGELOG.md -Destination package/HighPop/
          Copy-Item publish_out/HighPop.exe "$baseName.exe"
          Compress-Archive -Path package/HighPop -DestinationPath "$baseName.zip" -CompressionLevel Optimal

          $releaseFiles = @("$baseName.exe", "$baseName.zip")
          foreach ($file in $releaseFiles) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $file" | Set-Content "$file.sha256" -Encoding ascii
          }

          $manifest = [ordered]@{
            product = "HighPop Rust Manager"
            version = "${{ needs.prepare.outputs.version }}"
            runtime = "win-x64"
            commit = "${{ github.sha }}"
            files = @($releaseFiles | ForEach-Object {
              [ordered]@{
                name = $_
                sha256 = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLowerInvariant()
                bytes = (Get-Item $_).Length
              }
            })
          }
          $manifest | ConvertTo-Json -Depth 4 |
            Set-Content "$baseName.manifest.json" -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HighPop-${{ needs.prepare.outputs.tag }}-win-x64
          path: |
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.exe
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.exe.sha256
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.zip
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.zip.sha256
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.manifest.json

      - name: Create release tag
        if: github.ref_type != 'tag'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "HighPop Rust Manager ${{ needs.prepare.outputs.tag }}" "$env:GITHUB_SHA"
          git push origin "refs/tags/${{ needs.prepare.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: HighPop Rust Manager ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.exe
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.exe.sha256
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.zip
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.zip.sha256
            HighPop-${{ needs.prepare.outputs.tag }}-win-x64.manifest.json
