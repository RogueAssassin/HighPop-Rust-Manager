name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore HighPop.sln

      - name: Build
        run: dotnet build HighPop.sln -c Release --no-restore

      - name: Smoke tests
        run: dotnet run --project HighPop.SmokeTests/HighPop.SmokeTests.csproj -c Release --no-build

      - name: Publish self-contained single file
        run: dotnet publish HighPop/HighPop.csproj -c Release -r win-x64 --self-contained true -o publish_out

      - name: Assemble portable package
        shell: pwsh
        run: |
          New-Item package/HighPop/assets/presets -ItemType Directory -Force | Out-Null
          Copy-Item publish_out/HighPop.exe package/HighPop/
          Copy-Item HighPop/assets/README.txt package/HighPop/assets/
          Copy-Item HighPop/assets/presets/*.json package/HighPop/assets/presets/
          Copy-Item -Path LICENSE,NOTICE.md,README.md,CHANGELOG.md -Destination package/HighPop/
          Compress-Archive -Path package/HighPop -DestinationPath "HighPop-${{ github.ref_name }}-win-x64.zip" -CompressionLevel Optimal
          Get-FileHash "HighPop-${{ github.ref_name }}-win-x64.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  HighPop-${{ github.ref_name }}-win-x64.zip" } | Set-Content "HighPop-${{ github.ref_name }}-win-x64.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HighPop-${{ github.ref_name }}-win-x64
          path: |
            HighPop-${{ github.ref_name }}-win-x64.zip
            HighPop-${{ github.ref_name }}-win-x64.zip.sha256

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: HighPop Rust Manager ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            HighPop-${{ github.ref_name }}-win-x64.zip
            HighPop-${{ github.ref_name }}-win-x64.zip.sha256
